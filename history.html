<!DOCTYPE html>
<html>
<head>
    <title>Parking History</title>
</head>
<body>

<h1>📋 Parking History</h1>

<table border="1" cellpadding="10">
    <tr>
        <th>Slot</th>
        <th>Vehicle Number</th>
        <th>Hours</th>
        <th>Fee</th>
    </tr>

    {% for item in history %}
    <tr>
        <td>{{ item.slot }}</td>
        <td>{{ item.vehicle }}</td>
        <td>{{ item.hours }}</td>
        <td>₹{{ item.fee }}</td>
    </tr>
    {% endfor %}

</table>

<br>
<a href="/dashboard">
    <button>Back to Dashboard</button>
</a>

</body>
</html>
