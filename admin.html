```
<style>
    body{
        font-family: Arial, sans-serif;
        text-align: center;

    }

    .card{
        background: white;
        width: 400px;
        margin: auto;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;

    }

    button{
        padding: 10px 20px;
        border: none;
        background: green;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover{
        background: darkgreen;
    }
</style>

<div class="card">
